# SMC Trader System 7.0 - Kernel Optimizations for Trading
# /etc/sysctl.d/99-smc-trader.conf

# ─── Memory Management ───
# Reduce swappiness - keep trading processes in RAM, avoid swap latency
vm.swappiness = 10

# Keep more directory/inode cache in RAM for faster file access
vm.vfs_cache_pressure = 50

# Flush dirty pages more aggressively - less IO latency spikes
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10

# Writeback interval (centiseconds) - more frequent flushes, smaller bursts
vm.dirty_writeback_centisecs = 500
vm.dirty_expire_centisecs = 3000

# Overcommit memory for Wine/MT5 processes that allocate large virtual space
vm.overcommit_memory = 1
vm.overcommit_ratio = 50

# Minimize kernel threads waking up for page compaction
vm.compaction_proactiveness = 0

# ─── Network ───
# Larger connection backlog for MT5 bridges and Streamlit
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 65535

# TCP Fast Open - reduce connection latency
net.ipv4.tcp_fastopen = 3

# Faster TCP recovery after connection drops
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# Increase TCP buffer sizes for MT5 data transfer
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# ─── File System ───
# Maximum file handles (already high, ensure adequate)
fs.file-max = 1048576

# Reduce inode cache pressure for better DB performance
fs.inode-max = 524288

# ─── Process Scheduler ───
# Ensure enough PID space for Wine processes
kernel.pid_max = 4194304

# Reduce hung task timeout - detect stuck processes faster
kernel.hung_task_timeout_secs = 60
